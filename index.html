<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LeylaparisDev - YouTube</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div class="background"></div>

  <header>
    <div class="logo">
      <i class="fab fa-youtube"></i>
      <h1>LeylaparisDev</h1>
    </div>
    <p class="subtitle">Contenido bonito y lleno de rosa 💖</p>
    
    <!-- Contador de suscriptores -->
    <div class="sub-count">
      <span id="subscribers">0</span> Suscriptores
    </div>
  </header>

  <main>
    <!-- Último video -->
    <section class="latest-video">
      <h2>Último Video</h2>
      <div id="latest-video-container"></div>
    </section>

    <!-- Galería -->
    <section class="video-gallery">
      <div class="gallery-header">
        <h2>Todos los Videos</h2>
        <input type="text" id="searchInput" placeholder="Buscar video...">
        <select id="dateFilter">
          <option value="">Todos</option>
          <option value="7">Última semana</option>
          <option value="30">Último mes</option>
          <option value="90">Últimos 3 meses</option>
        </select>
      </div>
      
      <div id="video-grid" class="grid"></div>
      <button id="loadMoreBtn" class="load-more">Cargar más videos</button>
    </section>

    <!-- Encuesta -->
    <section class="survey">
      <h2>Participa en la encuesta para ser elegida en un video 🎥</h2>
      <form id="surveyForm">
        <input type="text" id="name" placeholder="Tu nombre completo" required>
        <input type="number" id="age" placeholder="Edad" min="8" required>
        <input type="text" id="country" placeholder="País" required>
        <input type="tel" id="phone" placeholder="Número de teléfono (con WhatsApp)" required>
        
        <button type="button" id="submitSurvey" class="submit-btn">Enviar ✨</button>
      </form>
    </section>
  </main>

  <footer>
    <p>Hecho con 💖 para la comunidad de LeylaparisDev</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
