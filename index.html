<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>@obbybeta - YouTube</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <!-- Pantalla de carga -->
  <div id="loader" class="loader-screen">
    <div class="spinner"></div>
    <p class="loading-text">Cargando canal rosa...</p>
  </div>

  <div class="content" style="display: none;">

    <div class="background"></div>

    <header>
      <div class="logo">
        <i class="fab fa-youtube"></i>
        <h1>@obbybeta</h1>
      </div>
      <p class="subtitle">¡LeylaparisDev videos!</p>
    </header>

    <main>
      <!-- Último video -->
      <section class="latest-video">
        <h2>Último Video Subido</h2>
        <div id="latest-video-container">
          <!-- El video se carga aquí automáticamente -->
        </div>
      </section>

      <!-- Botones -->
      <div class="buttons">
        <a href="https://youtube.com/@obbybeta" target="_blank" class="btn subscribe">
          <i class="fab fa-youtube"></i> Suscribirse al Canal
        </a>
        <a href="https://youtube.com/@obbybeta/videos" target="_blank" class="btn watch">
          <i class="fas fa-play"></i> Ver Todos los Videos
        </a>
      </div>
    </main>

    <footer>
      <p>®TODOS LOS DERECHOS RESERVADOS 2026</p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
